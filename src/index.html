<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snap & Recycle</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="header">
        <i class="fa-solid fa-recycle header-icon"></i>
        <h1>Snap & Recycle</h1>
        <i class="fa-solid fa-recycle header-icon"></i>

    </div>

    <div class="container">
        <div class="left-panel">
            <div class="upload-box" id="imagePreview">
                <span class="box-label">Aggiungi una foto</span>
            </div>
            <input type="file" id="imageUpload" hidden accept="image/*">
            <input type="file" id="cameraCapture" hidden accept="image/*" capture="environment">

            <div class="center-icons">
                <button class="circle-btn" id="refreshBtn">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </button>
                <button class="circle-btn" id="addPhotoBtn">
                    <i class="fa-regular fa-image"></i>
                </button>
                <button class="circle-btn" id="cameraBtn">
                    <i class="fa-solid fa-camera"></i>
                </button>
                <button class="circle-btn" id="settingsBtn">
                    <i class="fa-solid fa-gear"></i>
                </button>
            </div>

            <div class="buttons">
                <button class="action-btn" data-type="RECYCLE">RICICLA</button>
                <button class="action-btn" data-type="REUSE">RIUTILIZZA</button>
                <button class="action-btn" data-type="REDUCE">RIDUCI</button>
                <button class="action-btn" data-type="OTHER">ALTRO</button>
            </div>
            <!-- pannello cronologia immagini scorrevole, simile a upload-box -->
            <div class="history-panel" id="historyPanel">
                <span class="box-label">history</span>
            </div>
        </div>

        <div class="right-panel">
            <span class="box-label">Risultati rilasciati:</span>
            <div id="analysisResults"></div>

            <div class="top-icons">
                <button class="icon-btn" id="copyBtn">
                    <i class="fa-regular fa-copy"></i>
                </button>
                <button class="icon-btn" id="retryBtn">
                    <i class="fa-solid fa-rotate"></i> </button>
            </div>
        </div>
    </div>

    <!-- ================= FOOTER / CREDITS ================= -->
    <div class="footer">
        <p>© 2026 Snap & Recycle — Crediti: Mangioni Christian, Migliori Fernando, Corsaro Marco, Calanna Riccardo</p>
    </div>


    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/project-dialog.js"></script>
</body>

</html>
